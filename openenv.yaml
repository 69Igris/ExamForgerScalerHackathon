# ExamForge OpenEnv Environment Manifest
# Validated against OpenEnv spec v1

spec_version: 1
name: examforge_env
type: space
runtime: fastapi
app: server.app:app
port: 7860
version: "1.0.0"

description: >
  ExamForge: A multi-task RL environment for training LLM agents to generate,
  validate, and assemble high-quality competitive exam papers. Targets India's
  JEE, GATE, and UPSC examinations — 2.5 million candidates annually. Features
  three difficulty-progressive tasks with programmatic graders, dense reward
  shaping, and a complete pipeline from question generation to paper assembly.

author: "Team ExamForge"
license: "MIT"

tags:
  - openenv
  - education
  - reasoning
  - question-generation
  - rl-training
  - india
  - jee
  - gate
  - upsc

action_class: ExamForgeAction
observation_class: ExamForgeObservation
max_episode_steps: 50

reward_range: [-1.0, 3.0]

observation_space:
  type: structured
  description: "Rich textual state including episode context, question bank status, validation feedback, and paper assembly metrics"

action_space:
  type: structured
  actions:
    - generate_question
    - validate_question
    - flag_question
    - assemble_paper

env_vars:
  - name: API_BASE_URL
    description: "OpenAI-compatible LLM API endpoint"
    required: false
    default: "https://router.huggingface.co/v1"
  - name: MODEL_NAME
    description: "LLM model identifier (e.g. Qwen/Qwen2.5-72B-Instruct)"
    required: false
    default: "Qwen/Qwen2.5-72B-Instruct"
  - name: HF_TOKEN
    description: "HuggingFace API token for LLM access"
    required: false

tasks:
  - name: question_generation
    description: >
      EASY: Agent generates 12+ high-quality MCQs across 5+ topics.
      Graded on question count (40%), topic diversity (40%), marks variety (20%).
      Expected score: 0.60-0.99 for capable LLMs.
    difficulty: easy
    grader: server.environment:question_generation_grader
    max_steps: 20

  - name: question_validation
    description: >
      MEDIUM: Agent generates questions then validates each programmatically.
      Flags low-quality items. Graded on validation coverage (40%),
      average quality score (40%), flagging precision (20%).
      Expected score: 0.50-0.90 for capable LLMs.
    difficulty: medium
    grader: server.environment:question_validation_grader
    max_steps: 40

  - name: paper_assembly
    description: >
      HARD: Full pipeline — generate, validate, flag, then assemble a balanced
      paper. Graded on assembly completion (30%), topic coverage (30%),
      difficulty distribution (25%), validation ratio (15%).
      Targets: 5+ topics, 30% easy/50% medium/20% hard distribution.
      Expected score: 0.40-0.85 for capable LLMs.
    difficulty: hard
    grader: server.environment:paper_assembly_grader
    max_steps: 50
